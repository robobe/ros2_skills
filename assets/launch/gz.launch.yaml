launch:
  - arg:
      name: "bridge_config_file"
      default: "$(find-pkg-share <prefix>_bringup)/config/bridge.yaml"

  - arg:
      name: "world_name"
      default: "empty.world"


    #gazebo simulation
  - executable:
      cmd: gz sim -v 4 -r $(var world_name)
      output: screen
      env:
        - name: GZ_SIM_RESOURCE_PATH
          value: "$(find-pkg-share <prefix>_gazebo)/worlds"

    #ros-gz bridge
  - node:
      pkg: "ros_gz_bridge"
      exec: "parameter_bridge"
      output: screen
      args:
          "--ros-args -p config_file:=$(var bridge_config_file)"